services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data
    environment:
      - PORT=4000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
